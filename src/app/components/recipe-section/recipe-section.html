@if (hasVisibleCards()) {
  <div class="section-label" [id]="'section-' + sectionIndex()">{{ section().label }}</div>
  <div class="section-description">{{ section().description }}</div>

  @if (section().intro) {
    <app-intro [intro]="section().intro!" />
  }

  <div class="cards">
    @for (card of section().cards; track $index) {
      @if (isCardVisible(card)) {
        <app-recipe-card [card]="card" [cardId]="'recipe-' + sectionIndex() + '-' + $index" />
      }
    }
  </div>
}
