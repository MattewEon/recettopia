<p class="section-title" [style]="group().style ?? null">{{ group().title }}</p>
@for (item of items(); track $index) {
  <div class="step">
    <div class="step-num">{{ $index + 1 }}</div>
    <div class="step-text">
      <span class="step-label">{{ item.label }}</span>
      {{ item.text }}
    </div>
  </div>
}
