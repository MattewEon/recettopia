<div style="max-width:940px;margin:0 auto 36px;">
  <div class="card" style="border-left:4px solid var(--gold);">
    <div class="card-body">
      <p class="section-title" style="color:var(--gold);margin-bottom:16px;">{{ intro().title }}</p>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;">
        @for (item of intro().items; track item.label) {
          <div class="variante">
            <strong>{{ item.label }}</strong>
            {{ item.text }}
          </div>
        }
      </div>
    </div>
  </div>
</div>
