<button
  class="toc-toggle"
  aria-label="Sommaire"
  [attr.aria-expanded]="tocOpen()"
  (click)="toggleToc()"
>☰</button>

<div class="toc-backdrop" (click)="closeToc()"></div>

<app-toc [sections]="sections" [open]="tocOpen()" (linkClicked)="closeToc()" />

<header>
  <p class="sub">Carnet de recettes d'Adelle &amp; Mattew</p>
  <h1>Mes recettes <em>maison</em></h1>
  <div class="divider"></div>
</header>

<app-filter-bar [activeFilters]="activeFilters()" (filterToggle)="toggleFilter($event)" />

<main>
  @for (section of sections; track $index) {
    <app-recipe-section [section]="section" [sectionIndex]="$index" [activeFilters]="activeFilters()" />
  }
</main>
