<button
  class="toc-toggle"
  aria-label="Sommaire"
  [attr.aria-expanded]="tocOpen()"
  (click)="toggleToc()"
>☰</button>

<button
  class="ingredient-index-toggle"
  aria-label="Index des ingrédients"
  [attr.aria-expanded]="ingredientIndexOpen()"
  [class.has-selection]="selectedIngredients().length > 0"
  (click)="toggleIngredientIndex()"
>
  🥕
  @if (selectedIngredients().length > 0) {
    <span class="ingredient-badge">{{ selectedIngredients().length }}</span>
  }
</button>

<div class="toc-backdrop" (click)="closeToc()"></div>
<div class="ingredient-backdrop" (click)="closeIngredientIndex()"></div>

<app-toc
  [sections]="sections"
  [open]="tocOpen()"
  [activeFilters]="activeFilters()"
  (linkClicked)="closeToc()"
  (clearFiltersAndGo)="clearFiltersAndGo($event)"
/>

<app-ingredient-index
  [sections]="sections"
  [open]="ingredientIndexOpen()"
  [selectedIngredients]="selectedIngredients()"
  (ingredientToggle)="toggleIngredient($event)"
  (clearSelection)="clearIngredients()"
  (close)="closeIngredientIndex()"
/>

<header>
  <p class="sub">Recettopia</p>
  <h1>Nos recettes <em>maison,</em></h1>
  <h2>par Adelle et Mattew.</h2>
  <div class="divider"></div>
</header>

<app-filter-bar [activeFilters]="activeFilters()" (filterToggle)="toggleFilter($event)" />

<main>
  @for (section of sections; track $index) {
    <app-recipe-section
      [section]="section"
      [sectionIndex]="$index"
      [activeFilters]="activeFilters()"
      [selectedIngredients]="selectedIngredients()"
    />
  }
</main>
